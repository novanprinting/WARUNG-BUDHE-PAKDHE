        let cart = [];

        function renderProducts(filter = 'semua') {
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            const filtered = filter === 'semua' ? products : products.filter(p => p.cat === filter);
            
            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white rounded-3xl p-3 shadow-sm flex gap-4 border border-gray-100 items-center hover:shadow-md transition-shadow">
                        <img src="${p.img}" class="w-24 h-24 rounded-2xl object-cover border border-gray-100">
                        <div class="flex-1">
                            <h3 class="font-bold text-gray-800 text-base leading-tight">${p.name}</h3>
                            <p class="text-gray-400 text-[11px] mt-1 line-clamp-2">${p.desc}</p>
                            <div class="flex justify-between items-center mt-3">
                                <span class="text-red-600 font-black text-sm">Rp ${p.price.toLocaleString()}</span>
                                <button onclick="openTopping(${p.id})" class="bg-gray-900 text-white px-4 py-1.5 rounded-xl text-xs font-bold active:scale-90 transition-transform tracking-wide">+ TAMBAH</button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function filterMenu(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('category-active'));
            btn.classList.add('category-active');
            renderProducts(cat);
        }

        function openTopping(id) {
            const p = products.find(x => x.id === id);
            const modal = document.getElementById('topping-modal');
            const content = document.getElementById('modal-content');
            
            let toppingHTML = p.toppings.map((t, i) => `
                <label class="flex justify-between items-center p-4 bg-gray-50 rounded-2xl mb-2 cursor-pointer active:bg-gray-100">
                    <span class="font-semibold text-gray-700">${t.n} <span class="text-xs text-red-500 block">+Rp ${t.p.toLocaleString()}</span></span>
                    <input type="checkbox" class="topping-opt w-6 h-6 accent-red-600 rounded-lg" data-name="${t.n}" data-price="${t.p}">
                </label>
            `).join('');

            content.innerHTML = `
                <div class="text-center mb-6">
                    <div class="w-16 h-1 bg-gray-200 rounded-full mx-auto mb-4"></div>
                    <h3 class="text-xl font-black text-gray-800">${p.name}</h3>
                    <p class="text-gray-400 text-sm mt-1">Pilih menu pelengkap jika tersedia</p>
                </div>
                <div class="max-h-72 overflow-y-auto pr-1 no-scrollbar">
                    ${toppingHTML || '<div class="text-center py-8 text-gray-400 italic">Tidak ada topping tersedia</div>'}
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="closeModal()" class="flex-1 py-4 bg-gray-100 text-gray-500 rounded-2xl font-bold active:scale-95 transition-all">Batal</button>
                    <button onclick="addToCart(${p.id})" class="flex-1 py-4 bg-red-600 text-white rounded-2xl font-bold shadow-lg shadow-red-100 active:scale-95 transition-all">Konfirmasi</button>
                </div>
            `;
            modal.style.display = 'flex';
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            const selectedToppings = [];
            document.querySelectorAll('.topping-opt:checked').forEach(opt => {
                selectedToppings.push({ n: opt.dataset.name, p: parseInt(opt.dataset.price) });
            });

            cart.push({ ...p, selectedToppings });
            updateCartUI();
            closeModal();
        }

        function updateCartUI() {
            const count = cart.length;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('footer-count').innerText = `${count} Menu dipilih`;
            document.getElementById('cart-footer').style.display = count > 0 ? 'flex' : 'none';
            
            let total = 0;
            const container = document.getElementById('cart-items');
            container.innerHTML = '';

            cart.forEach((item, index) => {
                let itemTotal = item.price;
                let toppingsText = item.selectedToppings.map(t => {
                    itemTotal += t.p;
                    return t.n;
                }).join(', ');

                total += itemTotal;
                container.innerHTML += `
                    <div class="bg-white border-2 border-gray-50 p-4 rounded-3xl flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800">${item.name}</p>
                            <p class="text-[10px] text-gray-400 font-medium">${toppingsText || 'Original'}</p>
                            <p class="text-sm font-black text-red-600 mt-1">Rp ${itemTotal.toLocaleString()}</p>
                        </div>
                        <button onclick="removeFromCart(${index})" class="w-10 h-10 bg-red-50 text-red-500 rounded-full flex items-center justify-center active:scale-90 transition-all">
                            <i class="fa-solid fa-trash-can text-sm"></i>
                        </button>
                    </div>
                `;
            });
            document.getElementById('footer-total').innerText = `Rp ${total.toLocaleString()}`;
            document.getElementById('final-total').innerText = `Rp ${total.toLocaleString()}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
            if(cart.length === 0) toggleCart();
        }

        function toggleCart() {
            const el = document.getElementById('cart-page');
            el.classList.toggle('hidden');
        }

        function closeModal() {
            document.getElementById('topping-modal').style.display = 'none';
        }

        function sendToWA() {
    const name = document.getElementById('customer-name').value.trim();
    const address = document.getElementById('customer-address').value.trim();
    const method = document.querySelector('input[name="method"]:checked').value;

    // Validasi input
    if (cart.length === 0) return alert("Keranjang masih kosong!");
    if (!name) return alert("Mohon isi Nama Pemesan");
    if (!address) return alert("Mohon isi Alamat atau Nomor Meja");

    let total = 0;
    let text = `*PESANAN BARU - WARUNG KITA*\n`;
    text += `--------------------------------\n`;
    text += `?? *Nama:* ${name}\n`;
    text += `?? *Alamat:* ${address}\n`;
    text += `?? *Metode:* ${method}\n`;
    text += `--------------------------------\n\n`;
    
    cart.forEach((item, i) => {
        let subtotal = item.price;
        let toppings = item.selectedToppings.map(t => {
            subtotal += t.p;
            return t.n;
        }).join(', ');
        total += subtotal;
        text += `${i+1}. *${item.name}*\n`;
        text += `   Opt: ${toppings || 'Original'}\n`;
        text += `   Harga: Rp ${subtotal.toLocaleString()}\n\n`;
    });

    text += `--------------------------------\n`;
    text += `*TOTAL AKHIR: Rp ${total.toLocaleString()}*\n`;
    text += `--------------------------------\n`;
    text += `_Mohon segera diproses ya, terima kasih!_`;
    
    const encodedText = encodeURIComponent(text);
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodedText}`);
}

        // Jalankan render saat loading
        window.onload = renderProducts;
    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('Service Worker terdaftar!', reg))
        .catch(err => console.log('Gagal daftar Service Worker', err));
    });
  }
</script>
</body>

</html>
